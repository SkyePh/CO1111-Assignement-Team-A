<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THC | Treasure Hunt</title>
    <link rel="stylesheet" href="../styles/app.css">
    <script src="../libraries/instascan.min.js"></script>
</head>
<body>
<div class="container">
<h1 id="title"></h1>

<div id="scoreBox">Score: <span id="scoreValue">—</span></div>

<form id="startForm">
<label>
    Enter your name:
    <input type="text" id="playerName" required placeholder="Your name...">
</label>
<button type="submit">Start Quest</button>
</form>

<div id="questionBox"></div>

<div id="answerBox"></div>

<div id="qrSection">
    <button type="button" id="qrToggleBtn">Scan QR Code</button>
    <div id="qrPreviewWrapper">
        <video id="qrPreview"></video>
    </div>
    <p id="qrContent"><span class="qr-placeholder">QR Code Content...</span></p>
</div>
</div>

<script src="../js/app.js"></script>
</body>
</html>
