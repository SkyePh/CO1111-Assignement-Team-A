<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THC | Leaderboard API Testing</title>
    <link rel="stylesheet" href="../../styles/index.css">
    <link rel="stylesheet" href="../../styles/leaderboardTesting.css">
</head>
<body class="leaderboard-testing-page">
<div class="container">
    <h1>Leaderboard Tester</h1>

    <div class="controls">
        <div class="params">
            <label for="sizeInput">Size</label>
            <input type="number" id="sizeInput" min="1" placeholder="42" title="Number of entries (default 42)">
            <label class="checkbox-label">
                <input type="checkbox" id="sortedCheckbox">
                Sorted
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="hasPrizeCheckbox">
                hasPrize
            </label>
        </div>
        <button id="loadLeaderboardBtn">Load Leaderboard</button>
    </div>

    <div class="leaderboard-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Score</th>
                </tr>
            </thead>

            <tbody id="leaderboard-body">
               <tr>
                   <td colspan="3">Press the button to load Leaderboard!</td>
               </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const button = document.getElementById("loadLeaderboardBtn");

    button.addEventListener("click", loadLeaderboard);
    function loadLeaderboard() {
        const sizeInput = document.getElementById("sizeInput");
        const sortedCheckbox = document.getElementById("sortedCheckbox");
        const hasPrizeCheckbox = document.getElementById("hasPrizeCheckbox");

        let size = parseInt(sizeInput.value, 10);
        if (isNaN(size) || size < 1) size = 42;

        const params = new URLSearchParams();
        params.set("size", String(size));
        if (sortedCheckbox.checked) params.set("sorted", "true");
        if (hasPrizeCheckbox.checked) params.set("hasPrize", "true");

        const url = "https://codecyprus.org/th/test-api/leaderboard?" + params.toString();

        fetch(url)
            .then(response => response.json())
            .then(data => {

                const tbody = document.getElementById("leaderboard-body");
                tbody.innerHTML = "";
                if (data.status === "OK") {

                    let index = 1;
                    data.leaderboard.forEach(player => {

                        const row = document.createElement("tr");
                        row.innerHTML = `
                                <td>${index}</td>
                                <td>${player.player}</td>
                                <td>${player.score}</td>
                                        `;
                        tbody.appendChild(row);

                        index++;
                    });
                } else {
                    tbody.innerHTML = "<tr><td colspan='3'>Error loading the leaderboard</td></tr>";
                }

            })
            .catch(error => {console.log(error)

                document.getElementById("leaderboard-body").innerHTML = "<tr><td colspan='3'>API Error</td></tr>";
            });
    }
</script>
</body>
</html>
